{% extends "layout.html" %}
{% block title %}Register - GoTogether{% endblock %}
{% block content %}

<section class="glass-panel">
    <h1>Register</h1>

    <form onsubmit="event.preventDefault();">
        <div class="input-wrapper">
            <label class="input-label" for="first_name">First Name</label>
            <input 
                id="first_name" 
                type="text"
                placeholder="Enter first name"
                required
                autocomplete="given-name"
                aria-label="First Name"
            >
        </div>
        
        <div class="input-wrapper">
            <label class="input-label" for="last_name">Last Name</label>
            <input 
                id="last_name" 
                type="text"
                placeholder="Enter last name"
                required
                autocomplete="family-name"
                aria-label="Last Name"
            >
        </div>
        
        <div class="input-wrapper">
            <label class="input-label" for="dob">Date of Birth</label>
            <input 
                type="date" 
                id="dob"
                required
                aria-label="Date of Birth"
            >
        </div>
        
        <div class="input-wrapper">
            <label class="input-label" for="contact">Contact Number</label>
            <input 
                id="contact" 
                type="tel"
                placeholder="Enter phone number"
                required
                autocomplete="tel"
                aria-label="Contact Number"
            >
        </div>
        
        <div class="input-wrapper">
            <label class="input-label" for="email">Email Address</label>
            <input 
                type="email" 
                id="email" 
                placeholder="your.email@example.com"
                required
                autocomplete="email"
                aria-label="Email Address"
            >
        </div>
        
        <div class="input-wrapper">
            <label class="input-label" for="password">Password</label>
            <input 
                type="password" 
                id="password" 
                placeholder="Create a password"
                required
                autocomplete="new-password"
                minlength="6"
                aria-label="Password"
            >
        </div>

        <!-- SECURITY QUESTION 1 -->
        <div class="input-wrapper">
            <label class="input-label" for="security_q1">Security Question 1</label>
            <select id="security_q1" required aria-label="Security Question 1">
                <option value="">Select a question</option>
                <option value="pet">What is your first pet name?</option>
                <option value="school">What is your school name?</option>
                <option value="city">In which city were you born?</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label class="input-label" for="security_a1">Answer 1</label>
            <input 
                id="security_a1" 
                type="text" 
                placeholder="Your answer"
                required
                aria-label="Security Answer 1"
            >
        </div>

        <!-- SECURITY QUESTION 2 -->
        <div class="input-wrapper">
            <label class="input-label" for="security_q2">Security Question 2</label>
            <select id="security_q2" required aria-label="Security Question 2">
                <option value="">Select a question</option>
                <option value="mother">What is your mother's maiden name?</option>
                <option value="food">What is your favorite food?</option>
                <option value="movie">What is your favorite movie?</option>
            </select>
        </div>

        <div class="input-wrapper">
            <label class="input-label" for="security_a2">Answer 2</label>
            <input 
                id="security_a2" 
                type="text" 
                placeholder="Your answer"
                required
                aria-label="Security Answer 2"
            >
        </div>

        <button type="button" onclick="sendOTP()">Send OTP</button>

        <div class="input-wrapper" style="margin-top: 20px;">
            <label class="input-label" for="otp">OTP Code</label>
            <input 
                id="otp" 
                type="text"
                placeholder="Enter 6-digit OTP"
                maxlength="6"
                aria-label="OTP Code"
            >
        </div>

        <button type="button" onclick="verifyRegister()">Verify & Register</button>
        
        <p style="margin-top:20px; text-align: center;">
            Already have an account? <a href="/login">Login here</a>
        </p>
    </form>
</section>

<script>
async function sendOTP() {
    const email = document.getElementById("email").value;
    
    if (!email) {
        alert("Please enter your email address");
        return;
    }

    try {
        const res = await fetch("/register/send_otp", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({email})
        });

        const result = await res.json();
        
        if (result.success || res.ok) {
            alert("OTP sent to your email");
        } else {
            alert(result.error || "Failed to send OTP");
        }
    } catch (error) {
        alert("An error occurred. Please try again.");
        console.error(error);
    }
}

async function verifyRegister() {
    const data = {
        first_name: document.getElementById("first_name").value,
        last_name: document.getElementById("last_name").value,
        dob: document.getElementById("dob").value,
        contact: document.getElementById("contact").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        security_q1: document.getElementById("security_q1").value,
        security_a1: document.getElementById("security_a1").value,
        security_q2: document.getElementById("security_q2").value,
        security_a2: document.getElementById("security_a2").value,
        otp: document.getElementById("otp").value
    };

    // Validation
    if (!data.first_name || !data.last_name || !data.dob || !data.contact || !data.email || !data.password || !data.security_q1 || !data.security_a1 || !data.security_q2 || !data.security_a2 || !data.otp) {
        alert("Please fill in all fields");
        return;
    }

    try {
        const res = await fetch("/register/verify", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (result.redirect) {
            window.location.href = result.redirect;
        } else {
            alert(result.error || "Registration failed");
        }
    } catch (error) {
        alert("An error occurred. Please try again.");
        console.error(error);
    }
}
</script>

{% endblock %}
